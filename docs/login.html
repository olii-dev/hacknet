<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Hacknet</title>
  <script src="js/config.js"></script>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header><nav id="site-nav"></nav></header>
  <main>
    <div class="page-header" style="text-align:center">
      <h1>Log in</h1>
      <p>Welcome back to Hacknet.</p>
    </div>
    <div class="form-card">
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <p class="form-error" id="form-error" style="display:none"></p>
        <button type="submit" class="btn btn-primary" style="width:100%">Log in</button>
      </form>
      <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-muted)">
        Don't have an account? <a href="#" id="signup-link">Sign up</a>
      </p>
    </div>
  </main>
  <script type="module">
    import { initPage, pageUrl } from './js/ui.js';
    import { signIn } from './js/auth.js';

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('form-error');
    const returnUrl = new URLSearchParams(window.location.search).get('return');

    initPage();
    document.getElementById('signup-link').href = pageUrl('signup');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      try {
        await signIn(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        window.location.href = returnUrl ? decodeURIComponent(returnUrl) : pageUrl('index');
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
