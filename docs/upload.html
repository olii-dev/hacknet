<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload — Hacknet</title>
  <script src="js/config.js"></script>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header><nav id="site-nav"></nav></header>
  <main>
    <div class="page-header">
      <h1>Upload</h1>
      <p>Share a file with the community. Max <strong>15 MB</strong> per file — our upload server can't handle anything larger.</p>
    </div>
    <div class="form-card">
      <form id="upload-form">
        <div id="drop-zone" class="drop-zone" tabindex="0" role="button" aria-label="Drop file here or browse">
          <div class="drop-zone-icon">📁</div>
          <p class="drop-zone-title">Drag & drop your file here</p>
          <p class="drop-zone-hint">or click to browse</p>
          <p class="drop-zone-file" id="drop-zone-file" hidden></p>
          <img id="drop-zone-preview" class="drop-zone-preview" alt="" hidden>
        </div>
        <input type="file" id="file" class="file-input-hidden" required>
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" required maxlength="200" placeholder="Give your file a name">
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" placeholder="What's this file about?"></textarea>
        </div>
        <div class="form-group">
          <label for="tags">Tags (comma-separated)</label>
          <input type="text" id="tags" placeholder="music, tutorial, wallpaper">
        </div>
        <div class="upload-progress-panel" id="progress-wrap" hidden>
          <div class="upload-progress-header">
            <span class="upload-progress-label" id="progress-label">Uploading…</span>
            <span class="upload-progress-stats" id="progress-stats">0% · 0 B / 0 B</span>
          </div>
          <div class="upload-progress">
            <div class="upload-progress-bar" id="progress-bar"></div>
          </div>
          <div class="upload-progress-actions">
            <button type="button" class="btn btn-ghost btn-sm" id="cancel-upload-btn">Cancel upload</button>
          </div>
        </div>
        <p class="form-error" id="form-error" style="display:none"></p>
        <button type="submit" class="btn btn-primary" id="submit-btn">Upload</button>
      </form>
    </div>
  </main>
  <script type="module">
    import { initPage, showToast, pageUrl, formatBytes } from './js/ui.js';
    import { requireAuth } from './js/auth.js';
    import { uploadFile, formatUploadError, UploadCancelledError, formatUploadMbps } from './js/api.js';
    import { containsProfanity, profanityMessage } from './js/profanity.js';

    const form = document.getElementById('upload-form');
    const errorEl = document.getElementById('form-error');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const progressLabel = document.getElementById('progress-label');
    const progressStats = document.getElementById('progress-stats');
    const cancelUploadBtn = document.getElementById('cancel-upload-btn');
    const submitBtn = document.getElementById('submit-btn');
    const fileInput = document.getElementById('file');
    const dropZone = document.getElementById('drop-zone');
    const dropZoneFile = document.getElementById('drop-zone-file');
    const dropZonePreview = document.getElementById('drop-zone-preview');
    const maxBytes = window.HACKNET_CONFIG.maxUploadBytes;
    let previewObjectUrl = null;
    let uploadAbortController = null;

    function rejectOversizedFile(file) {
      showToast(`That file is too big (${formatBytes(file.size)}). Hacknet allows uploads up to ${formatBytes(maxBytes)}.`, 'error');
      errorEl.textContent = `Max file size is ${formatBytes(maxBytes)}. Pick a smaller file.`;
      errorEl.style.display = 'block';
      submitBtn.disabled = true;
      fileInput.value = '';
      dropZoneFile.hidden = true;
      clearPreview();
    }

    function setFormDisabled(disabled) {
      submitBtn.disabled = disabled;
      fileInput.disabled = disabled;
      dropZone.style.pointerEvents = disabled ? 'none' : '';
      dropZone.style.opacity = disabled ? '0.6' : '';
      document.getElementById('title').disabled = disabled;
      document.getElementById('description').disabled = disabled;
      document.getElementById('tags').disabled = disabled;
    }

    function resetProgress() {
      progressWrap.hidden = true;
      progressBar.style.width = '0%';
      progressBar.classList.remove('is-processing');
      progressLabel.textContent = 'Uploading…';
      progressStats.textContent = '0% · 0 B / 0 B';
      cancelUploadBtn.disabled = false;
    }

    function updateProgress({ phase, loaded, total, percent, bytesPerSecond }) {
      progressWrap.hidden = false;
      const safeTotal = total || loaded || 0;
      const pct = percent != null ? Math.min(100, Math.max(0, percent)) : (safeTotal ? (loaded / safeTotal) * 100 : 0);
      const displayPct = phase === 'processing' ? 100 : Math.round(pct);
      const speedLabel = phase === 'uploading' ? formatUploadMbps(bytesPerSecond) : '—';

      progressBar.style.width = `${displayPct}%`;
      progressBar.classList.toggle('is-processing', phase === 'processing');
      progressLabel.textContent = phase === 'processing' ? 'Saving to Mega…' : 'Uploading…';
      progressStats.textContent = `${displayPct}% · ${formatBytes(loaded)} / ${formatBytes(safeTotal)} · ${speedLabel}`;
    }

    cancelUploadBtn.addEventListener('click', () => {
      if (uploadAbortController) {
        cancelUploadBtn.disabled = true;
        progressLabel.textContent = 'Cancelling…';
        uploadAbortController.abort();
      }
    });

    initPage(async () => {
      if (!(await requireAuth())) return;
    });

    function clearPreview() {
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = null;
      }
      dropZonePreview.hidden = true;
      dropZonePreview.removeAttribute('src');
    }

    function handleFileSelected(file) {
      if (!file) return;

      if (file.size > maxBytes) {
        rejectOversizedFile(file);
        return;
      }

      errorEl.style.display = 'none';
      submitBtn.disabled = false;
      dropZoneFile.textContent = `${file.name} (${formatBytes(file.size)})`;
      dropZoneFile.hidden = false;

      if (!document.getElementById('title').value) {
        document.getElementById('title').value = file.name.replace(/\.[^.]+$/, '');
      }

      clearPreview();
      if (file.type.startsWith('image/')) {
        previewObjectUrl = URL.createObjectURL(file);
        dropZonePreview.src = previewObjectUrl;
        dropZonePreview.hidden = false;
      }
    }

    function setSelectedFile(file) {
      const dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
      handleFileSelected(file);
    }

    fileInput.addEventListener('change', (e) => {
      handleFileSelected(e.target.files[0]);
    });

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInput.click();
      }
    });

    ['dragenter', 'dragover'].forEach((event) => {
      dropZone.addEventListener(event, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.add('drag-over');
      });
    });

    ['dragleave', 'drop'].forEach((event) => {
      dropZone.addEventListener(event, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.remove('drag-over');
      });
    });

    dropZone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if (file) setSelectedFile(file);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';

      const file = fileInput.files[0];
      if (!file) {
        showToast('Please select a file to upload.', 'error');
        return;
      }

      if (file.size > maxBytes) {
        rejectOversizedFile(file);
        return;
      }

      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const tags = document.getElementById('tags').value
        .split(',')
        .map((t) => t.trim())
        .filter(Boolean);

      if (containsProfanity(title, description, tags.join(' '))) {
        errorEl.textContent = profanityMessage();
        errorEl.style.display = 'block';
        return;
      }

      uploadAbortController = new AbortController();
      setFormDisabled(true);
      updateProgress({ phase: 'uploading', loaded: 0, total: file.size, percent: 0 });

      try {
        const result = await uploadFile(
          file,
          { title, description, tags },
          {
            signal: uploadAbortController.signal,
            onProgress: updateProgress,
          },
        );

        progressLabel.textContent = 'Upload complete!';
        progressBar.classList.remove('is-processing');
        showToast('Upload complete!', 'success');
        setTimeout(() => {
          window.location.href = pageUrl('file', { id: result.id });
        }, 800);
      } catch (err) {
        resetProgress();
        setFormDisabled(false);
        uploadAbortController = null;

        if (err instanceof UploadCancelledError) {
          showToast('Upload cancelled.', 'info');
          return;
        }

        showToast(formatUploadError(err), 'error');
        errorEl.textContent = formatUploadError(err);
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
