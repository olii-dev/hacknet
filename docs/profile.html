<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Hacknet</title>
  <script src="js/config.js"></script>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header><nav id="site-nav"></nav></header>
  <main id="main-content">
    <p class="loading">Loading...</p>
  </main>
  <script type="module">
    import { initPage, renderFileGrid, escapeHtml, formatDate, showToast, pageUrl, creatorUsernameLabel, renderCollectionsList, bindCollectionDeleteButtons } from './js/ui.js';
    import { getProfile, getUserFiles, getUserCollections, createCollection, deleteCollection, enrichCollections } from './js/api.js';
    import { getUser, getProfile as getMyProfile, updateProfile } from './js/auth.js';

    const main = document.getElementById('main-content');

    initPage(async () => {
      let username = new URLSearchParams(window.location.search).get('u');
      if (!username) {
        const myProfile = getMyProfile();
        if (!myProfile?.username) {
          main.innerHTML = '<p class="error-state">No username specified.</p>';
          return;
        }
        username = myProfile.username;
        history.replaceState(null, '', pageUrl('profile', { u: username }));
      }

      try {
          const profile = await getProfile(username);
          const me = getUser();
          const myProfile = getMyProfile();
          const isOwn = me?.id === profile.id;

          const files = await getUserFiles(profile.id, isOwn);
          const collections = isOwn
            ? await enrichCollections(await getUserCollections(profile.id))
            : [];

          main.innerHTML = `
            <div class="page-header">
              <h1 class="profile-title">${creatorUsernameLabel(profile.username)}</h1>
              <p>${escapeHtml(profile.bio || 'No bio yet.')}</p>
              <p style="color:var(--text-muted);font-size:0.85rem">Joined ${formatDate(profile.created_at)}</p>
            </div>
            ${isOwn ? `
              <div class="sidebar-card" style="margin-bottom:2rem">
                <h2>Edit Profile</h2>
                <form id="profile-form">
                  <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" maxlength="500">${escapeHtml(profile.bio || '')}</textarea>
                  </div>
                  <button type="submit" class="btn btn-primary">Save</button>
                </form>
              </div>
              <div class="sidebar-card" style="margin-bottom:2rem">
                <h2>My Collections</h2>
                <div id="collections-list"></div>
                <form id="new-collection-form" style="margin-top:1rem">
                  <div class="form-group">
                    <label for="col-name">Name</label>
                    <input type="text" id="col-name" placeholder="e.g. Best wallpapers" required maxlength="100">
                  </div>
                  <div class="form-group">
                    <label for="col-desc">Description (optional)</label>
                    <input type="text" id="col-desc" placeholder="What's in this collection?" maxlength="500">
                  </div>
                  <label class="settings-row settings-row--toggle" style="margin-bottom:1rem">
                    <div class="settings-label">
                      <strong>Public</strong>
                      <span>Show on the Collections page</span>
                    </div>
                    <span class="toggle">
                      <input type="checkbox" id="col-public" checked>
                      <span class="toggle-slider"></span>
                    </span>
                  </label>
                  <button type="submit" class="btn btn-primary btn-sm">Create collection</button>
                </form>
              </div>
            ` : ''}
            <h2 style="margin-bottom:1rem">Uploads (${files.length})</h2>
            <div id="file-grid" class="file-grid"></div>
          `;

          await renderFileGrid(files, document.getElementById('file-grid'));

          if (isOwn) {
            const colList = document.getElementById('collections-list');
            colList.innerHTML = renderCollectionsList(collections, {
              showOwner: false,
              showVisibility: true,
              showDelete: true,
              emptyMessage: 'No collections yet — create one below.',
            });

            bindCollectionDeleteButtons(colList, async (id) => {
              await deleteCollection(id);
              showToast('Collection deleted', 'success');
              if (!colList.querySelector('.collection-card')) {
                colList.innerHTML = renderCollectionsList([], {
                  emptyMessage: 'No collections yet — create one below.',
                });
              }
            });

            document.getElementById('profile-form').addEventListener('submit', async (e) => {
              e.preventDefault();
              await updateProfile({ bio: document.getElementById('bio').value.trim() });
              showToast('Profile updated', 'success');
            });

            document.getElementById('new-collection-form').addEventListener('submit', async (e) => {
              e.preventDefault();
              const name = document.getElementById('col-name').value.trim();
              const description = document.getElementById('col-desc').value.trim();
              const is_public = document.getElementById('col-public').checked;
              const col = await createCollection(profile.id, { name, description, is_public });
              showToast('Collection created', 'success');
              window.location.href = pageUrl('collection', { id: col.id });
            });
          }
        } catch (err) {
          main.innerHTML = `<p class="error-state">${escapeHtml(err.message)}</p>`;
        }
    });
  </script>
</body>
</html>
