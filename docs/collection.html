<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection — Hacknet</title>
  <script src="js/config.js"></script>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header><nav id="site-nav"></nav></header>
  <main id="main-content">
    <p class="loading">Loading...</p>
  </main>
  <script type="module">
    import {
      initPage, renderFileGrid, escapeHtml, formatDate, formatBytes,
      showToast, pageUrl, creatorUsernameLabel, copyShareLink,
    } from './js/ui.js';
    import {
      getCollection, getCollectionFiles, getUserFiles,
      addToCollection, removeFromCollection, deleteCollection, updateCollection,
    } from './js/api.js';
    import { getUser, isModerator } from './js/auth.js';

    const main = document.getElementById('main-content');
    const collectionId = new URLSearchParams(window.location.search).get('id');

    if (!collectionId) {
      main.innerHTML = '<p class="error-state">No collection specified.</p>';
    } else {
      initPage(async () => {
        try {
          const collection = await getCollection(collectionId);
          const user = getUser();
          const isOwner = user?.id === collection.user_id;
          const canDelete = isOwner || isModerator();
          let files = await getCollectionFiles(collectionId, { includeUnapproved: isOwner });

          const visibilityBadge = collection.is_public
            ? '<span class="collection-badge collection-badge--public">Public</span>'
            : '<span class="collection-badge collection-badge--private">Private</span>';

          main.innerHTML = `
            <div class="page-header">
              <div class="collection-card-head" style="margin-bottom:0.5rem">
                <h1 style="margin:0">${escapeHtml(collection.name)}</h1>
                ${visibilityBadge}
              </div>
              ${collection.description ? `<p>${escapeHtml(collection.description)}</p>` : ''}
              <div class="collection-header-meta">
                <span>by <a href="${pageUrl('profile', { u: collection.profiles?.username || '' })}">${creatorUsernameLabel(collection.profiles?.username || 'unknown')}</a></span>
                <span>${formatDate(collection.created_at)}</span>
                <span id="file-count-label">${files.length} ${files.length === 1 ? 'file' : 'files'}</span>
              </div>
              <p style="margin-top:1rem;display:flex;flex-wrap:wrap;gap:0.5rem">
                <button type="button" id="copy-link-btn" class="btn btn-ghost btn-sm">Copy link</button>
                ${canDelete ? `<button type="button" id="delete-collection-btn" class="btn btn-danger btn-sm">Delete collection</button>` : ''}
              </p>
            </div>

            ${isOwner ? `
              <div class="collection-owner-tools">
                <details class="sidebar-card" id="edit-collection-panel">
                  <summary style="cursor:pointer;font-weight:600">Collection settings</summary>
                  <form id="collection-edit-form" style="margin-top:1rem">
                    <div class="form-group">
                      <label for="col-edit-name">Name</label>
                      <input type="text" id="col-edit-name" required maxlength="100" value="${escapeHtml(collection.name)}">
                    </div>
                    <div class="form-group">
                      <label for="col-edit-desc">Description</label>
                      <textarea id="col-edit-desc" maxlength="500" placeholder="What's this collection about?">${escapeHtml(collection.description || '')}</textarea>
                    </div>
                    <label class="settings-row settings-row--toggle" style="margin-bottom:1rem">
                      <div class="settings-label">
                        <strong>Public collection</strong>
                        <span>Visible on the Collections page</span>
                      </div>
                      <span class="toggle">
                        <input type="checkbox" id="col-edit-public" ${collection.is_public ? 'checked' : ''}>
                        <span class="toggle-slider"></span>
                      </span>
                    </label>
                    <button type="submit" class="btn btn-primary btn-sm">Save changes</button>
                  </form>
                </details>

                <details class="sidebar-card" id="add-files-panel" ${files.length ? '' : 'open'}>
                  <summary style="cursor:pointer;font-weight:600">Add files from your uploads</summary>
                  <p class="settings-hint" style="margin:0.75rem 0">Search by title, filename, or tag.</p>
                  <div class="file-picker">
                    <input type="search" id="upload-search" class="file-picker-search" placeholder="Search your uploads…" autocomplete="off">
                    <div id="upload-picker-list" class="file-picker-list"></div>
                    <p id="upload-picker-empty" class="empty-state" hidden>No matching uploads.</p>
                  </div>
                </details>
              </div>
            ` : ''}

            <div id="file-grid" class="file-grid"></div>
          `;

          const grid = document.getElementById('file-grid');
          const countLabel = document.getElementById('file-count-label');

          async function refreshGrid() {
            files = await getCollectionFiles(collectionId, { includeUnapproved: isOwner });
            countLabel.textContent = `${files.length} ${files.length === 1 ? 'file' : 'files'}`;
            await renderFileGrid(files, grid, {
              emptyMessage: isOwner
                ? 'No files yet — use "Add files from your uploads" above.'
                : 'This collection is empty.',
              removableCollectionId: isOwner ? collectionId : null,
              onRemoveFromCollection: isOwner ? async (fileId) => {
                await removeFromCollection(collectionId, fileId);
                showToast('Removed from collection', 'success');
                await refreshGrid();
                if (picker) picker.onCollectionChanged();
              } : null,
            });
          }

          await refreshGrid();

          document.getElementById('copy-link-btn')?.addEventListener('click', () => {
            copyShareLink(window.location.href);
          });

          document.getElementById('delete-collection-btn')?.addEventListener('click', async () => {
            if (!confirm('Permanently delete this collection? Files in it will not be deleted.')) return;
            try {
              await deleteCollection(collectionId);
              showToast('Collection deleted', 'success');
              window.location.href = pageUrl('collections');
            } catch (err) {
              showToast(err.message || 'Could not delete collection', 'error');
            }
          });

          let picker = null;
          if (isOwner) {
            document.getElementById('collection-edit-form').addEventListener('submit', async (e) => {
              e.preventDefault();
              try {
                const updated = await updateCollection(collectionId, {
                  name: document.getElementById('col-edit-name').value.trim(),
                  description: document.getElementById('col-edit-desc').value.trim(),
                  is_public: document.getElementById('col-edit-public').checked,
                });
                showToast('Collection updated', 'success');
                document.querySelector('.page-header h1').textContent = updated.name;
              } catch (err) {
                showToast(err.message || 'Could not save collection', 'error');
              }
            });

            const myUploads = await getUserFiles(user.id, true);
            picker = setupUploadPicker(collectionId, myUploads, files, refreshGrid);
          }
        } catch (err) {
          main.innerHTML = `<p class="error-state">${escapeHtml(err.message)}</p>`;
        }
      });
    }

    function setupUploadPicker(collectionId, uploads, inCollection, refreshGrid) {
      const search = document.getElementById('upload-search');
      const list = document.getElementById('upload-picker-list');
      const empty = document.getElementById('upload-picker-empty');
      const inSet = new Set(inCollection.map((f) => f.id));
      let available = uploads.filter((f) => !inSet.has(f.id));

      const render = (query = '') => {
        const q = query.trim().toLowerCase();
        const matches = available.filter((f) => {
          if (!q) return true;
          const haystack = `${f.title} ${f.filename} ${(f.tags || []).join(' ')}`.toLowerCase();
          return haystack.includes(q);
        });

        if (!available.length) {
          list.innerHTML = '';
          empty.textContent = 'All your uploads are already in this collection.';
          empty.hidden = false;
          return;
        }

        if (!matches.length) {
          list.innerHTML = '';
          empty.textContent = 'No matching uploads.';
          empty.hidden = false;
          return;
        }

        empty.hidden = true;
        list.innerHTML = matches.map((f) => `
          <div class="file-picker-item">
            <div class="file-picker-info">
              <strong>${escapeHtml(f.title)}</strong>
              <span class="file-picker-meta">
                ${escapeHtml(f.filename)} · ${formatBytes(f.size_bytes)}
                ${f.status !== 'approved' ? ` · <span class="status-badge status-${f.status}">${f.status}</span>` : ''}
              </span>
            </div>
            <button type="button" class="btn btn-primary btn-sm add-to-col-btn" data-id="${f.id}">Add</button>
          </div>
        `).join('');

        list.querySelectorAll('.add-to-col-btn').forEach((btn) => {
          btn.addEventListener('click', async () => {
            btn.disabled = true;
            try {
              await addToCollection(collectionId, btn.dataset.id);
              showToast('File added to collection', 'success');
              available = available.filter((f) => f.id !== btn.dataset.id);
              inSet.add(btn.dataset.id);
              await refreshGrid();
              render(search.value);
            } catch (err) {
              showToast(err.message || 'Could not add file', 'error');
              btn.disabled = false;
            }
          });
        });
      };

      search.addEventListener('input', () => render(search.value));
      render();

      return {
        onCollectionChanged() {
          inSet.clear();
          getCollectionFiles(collectionId, { includeUnapproved: true }).then((current) => {
            current.forEach((f) => inSet.add(f.id));
            available = uploads.filter((f) => !inSet.has(f.id));
            render(search.value);
          });
        },
      };
    }
  </script>
</body>
</html>
