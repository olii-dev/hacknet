<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection — Hacknet</title>
  <script src="js/config.js"></script>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header><nav id="site-nav"></nav></header>
  <main id="main-content">
    <p class="loading">Loading...</p>
  </main>
  <script type="module">
    import { initPage, renderFileGrid, escapeHtml, formatDate, showToast, pageUrl } from './js/ui.js';
    import { getCollection, getCollectionFiles, addToCollection } from './js/api.js';
    import { getUser } from './js/auth.js';

    const main = document.getElementById('main-content');
    const collectionId = new URLSearchParams(window.location.search).get('id');

    if (!collectionId) {
      main.innerHTML = '<p class="error-state">No collection specified.</p>';
    } else {
      initPage(async () => {
        try {
          const collection = await getCollection(collectionId);
          const files = await getCollectionFiles(collectionId);
          const user = getUser();
          const isOwner = user?.id === collection.user_id;

          main.innerHTML = `
            <div class="page-header">
              <h1>${escapeHtml(collection.name)}</h1>
              <p>${escapeHtml(collection.description || '')}</p>
              <p style="color:var(--text-muted);font-size:0.85rem">
                by <a href="${pageUrl('profile', { u: collection.profiles?.username || '' })}">@${escapeHtml(collection.profiles?.username || 'unknown')}</a>
                · ${formatDate(collection.created_at)}
                · ${collection.is_public ? 'Public' : 'Private'}
              </p>
            </div>
            ${isOwner ? `
              <div class="sidebar-card" style="margin-bottom:2rem">
                <h2>Add File to Collection</h2>
                <form id="add-file-form" class="search-bar">
                  <input type="text" id="file-id" placeholder="Paste file UUID" required>
                  <button type="submit" class="btn btn-primary">Add</button>
                </form>
              </div>
            ` : ''}
            <div id="file-grid" class="file-grid"></div>
          `;

          await renderFileGrid(files, document.getElementById('file-grid'));

          if (isOwner) {
            document.getElementById('add-file-form').addEventListener('submit', async (e) => {
              e.preventDefault();
              const fileId = document.getElementById('file-id').value.trim();
              await addToCollection(collectionId, fileId);
              showToast('File added to collection', 'success');
              window.location.reload();
            });
          }
        } catch (err) {
          main.innerHTML = `<p class="error-state">${escapeHtml(err.message)}</p>`;
        }
      });
    }
  </script>
</body>
</html>
