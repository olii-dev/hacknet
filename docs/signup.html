<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Hacknet</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="js/theme-init.js"></script>
</head>
<body>
  <header><nav id="site-nav"></nav></header>
  <main>
    <div class="page-header" style="text-align:center">
      <h1>Sign up</h1>
      <p>Join the Hacknet community!</p>
    </div>
    <div class="form-card">
      <form id="signup-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required minlength="3" maxlength="30" pattern="[a-zA-Z0-9_-]+" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password">
        </div>
        <p class="form-error" id="form-error" style="display:none"></p>
        <button type="submit" class="btn btn-primary" style="width:100%">Create account</button>
      </form>
      <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-muted)">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>
  <script type="module">
    import { initPage, showToast } from './js/ui.js';
    import { signUp } from './js/auth.js';

    const form = document.getElementById('signup-form');
    const errorEl = document.getElementById('form-error');

    initPage();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      try {
        const result = await signUp(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value,
          document.getElementById('username').value.trim()
        );
        if (result.session) {
          window.location.href = 'index.html';
        } else {
          showToast('Check your email to confirm your account!.', 'success');
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
