<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collections — Hacknet</title>
  <script src="js/config.js"></script>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header><nav id="site-nav"></nav></header>
  <main>
    <div class="page-header">
      <h1>Collections</h1>
      <p>Curated lists of community files.</p>
    </div>
    <div id="collections-list"></div>
  </main>
  <script type="module">
    import { initPage, escapeHtml, formatDate, setLoading, showError, pageUrl } from './js/ui.js';
    import { getPublicCollections } from './js/api.js';

    const list = document.getElementById('collections-list');

    initPage(async () => {
      setLoading(list);
      try {
        const collections = await getPublicCollections();
        if (!collections.length) {
          list.innerHTML = '<p class="empty-state">No public collections yet.</p>';
          return;
        }
        list.innerHTML = collections.map((c) => `
          <div class="collection-card">
            <h3><a href="${pageUrl('collection', { id: c.id })}">${escapeHtml(c.name)}</a></h3>
            <p>${escapeHtml(c.description || 'No description')}</p>
            <p style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-muted)">
              by @${escapeHtml(c.profiles?.username || 'unknown')} · ${formatDate(c.created_at)}
            </p>
          </div>
        `).join('');
      } catch (err) {
        showError(list, err.message);
      }
    });
  </script>
</body>
</html>
