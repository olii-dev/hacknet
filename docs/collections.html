<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collections — Hacknet</title>
  <script src="js/config.js"></script>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header><nav id="site-nav"></nav></header>
  <main>
    <div class="page-header">
      <h1>Collections</h1>
      <p>Curated lists of community files — playlists, packs, and themed sets.</p>
    </div>
    <div id="collections-list"></div>
  </main>
  <script type="module">
    import { initPage, setLoading, showError, renderCollectionsList, pageUrl } from './js/ui.js';
    import { getPublicCollections, enrichCollections } from './js/api.js';
    import { getProfile } from './js/auth.js';

    const list = document.getElementById('collections-list');

    initPage(async () => {
      setLoading(list);
      try {
        const collections = await enrichCollections(await getPublicCollections());
        if (!collections.length) {
          const profile = getProfile();
          const cta = profile
            ? `<a href="${pageUrl('profile', { u: profile.username })}" class="btn btn-primary" style="margin-top:1rem">Create a collection on your profile</a>`
            : `<a href="${pageUrl('signup')}" class="btn btn-primary" style="margin-top:1rem">Sign up to create collections</a>`;
          list.innerHTML = `
            <p class="empty-state">No public collections yet.</p>
            ${cta}
          `;
          return;
        }
        list.innerHTML = renderCollectionsList(collections, { grid: true, showOwner: true });
      } catch (err) {
        showError(list, err.message);
      }
    });
  </script>
</body>
</html>
